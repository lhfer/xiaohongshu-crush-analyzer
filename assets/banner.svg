<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
    <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#FF2442;stop-opacity:1" />
                  <stop offset="50%" style="stop-color:#FF6B6B;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#FF2442;stop-opacity:1" />
          </linearGradient>
          <filter id="shadow">
                  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
          </filter>
    </defs>
    <rect width="800" height="200" rx="16" fill="url(#bg)"/>
    <rect x="20" y="20" width="760" height="160" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Icon -->
    <text x="80" y="115" font-size="60" fill="white" text-anchor="middle">🔍</text>
    <!-- Main Title -->
    <text x="420" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">小红书用户深度画像分析</text>
    <!-- Subtitle -->
    <text x="420" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">AI-Powered Profile Analysis &amp; Pursuit Strategy for Xiaohongshu</text>
    <!-- Tags -->
    <rect x="240" y="142" width="80" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="280" y="158" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Psychology</text>
    <rect x="330" y="142" width="60" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="360" y="158" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Big Five</text>
    <rect x="400" y="142" width="90" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="445" y="158" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Claude Skill</text>
    <rect x="500" y="142" width="80" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="540" y="158" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Interactive</text>
</svg>
